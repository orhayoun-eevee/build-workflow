name: Release Helm Chart

on:
  workflow_call:
    inputs:
      chart_path:
        description: 'Path to the helm chart directory'
        required: false
        type: string
        default: '.'
      release_environment:
        description: 'GitHub environment for publish approvals/policies'
        required: false
        type: string
        default: 'production'
      enable_signing:
        description: 'Enable keyless signing/attestation for OCI chart artifacts'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-chart-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Publish Helm Chart to GitHub OCI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.release_environment }}
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      YQ_VERSION: v4.52.4
      YQ_SHA256: 0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c
      COSIGN_VERSION: v2.4.1
      COSIGN_SHA256: 8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'v3.21.0'

      - name: Install yq
        run: |
          set -euo pipefail
          curl -fsSL -o yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  yq" | sha256sum -c -
          chmod +x yq
          sudo mv yq /usr/local/bin/yq
          yq --version

      - name: Install cosign
        if: inputs.enable_signing
        run: |
          set -euo pipefail
          curl -fsSL -o cosign "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          echo "${COSIGN_SHA256}  cosign" | sha256sum -c -
          chmod +x cosign
          sudo mv cosign /usr/local/bin/cosign
          cosign version

      - name: Set chart path
        id: chart_path
        run: |
          set -euo pipefail
          CHART_PATH="${{ inputs.chart_path }}"
          if [ -z "${CHART_PATH}" ] || [ "${CHART_PATH}" = "null" ]; then
            CHART_PATH="."
          fi
          echo "path=${CHART_PATH}" >> "${GITHUB_OUTPUT}"
          echo "Using chart path: ${CHART_PATH}"

      - name: Verify release tag source
        id: release_source
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "ERROR: release-chart must run from a tag ref. Got ref type: ${GITHUB_REF_TYPE:-unset}"
            echo "Call this workflow from a tag-triggered workflow (for example refs/tags/v1.2.3)."
            exit 1
          fi

          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "ERROR: release-chart must run from a tag ref. Got: ${GITHUB_REF}"
            echo "Call this workflow from a tag-triggered workflow (for example refs/tags/v1.2.3)."
            exit 1
          fi

          git_tag="${GITHUB_REF#refs/tags/}"
          if [[ ! "${git_tag}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: release-chart tag must be a semver version tag. Got: ${git_tag}"
            echo "Expected examples: v1.2.3, 1.2.3, v1.2.3-rc.1, v1.2.3+build.1"
            exit 1
          fi

          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-list -n 1 "refs/tags/${git_tag}")"

          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "ERROR: release tag commit is not reachable from origin/main."
            echo "Tag: ${git_tag}"
            echo "Tag commit: ${tag_commit}"
            echo "origin/main: $(git rev-parse origin/main)"
            echo "Publish is blocked until the tagged commit is merged to main."
            exit 1
          fi

          {
            echo "git_tag=${git_tag}"
            echo "tag_commit=${tag_commit}"
          } >> "${GITHUB_OUTPUT}"

          echo "Release source verified: ${git_tag} -> ${tag_commit}"

      - name: Verify Chart.yaml version matches git tag
        working-directory: ${{ steps.chart_path.outputs.path }}
        run: |
          set -euo pipefail

          GIT_TAG="${{ steps.release_source.outputs.git_tag }}"
          if [[ "${GIT_TAG}" =~ ^v[0-9] ]]; then
            TAG_VERSION="${GIT_TAG#v}"
          else
            TAG_VERSION="${GIT_TAG}"
          fi

          if [ -z "${TAG_VERSION}" ]; then
            echo "ERROR: Could not extract version from git tag: ${GIT_TAG}"
            echo "Tag should be in format 'v1.2.3' or '1.2.3'"
            exit 1
          fi

          CHART_VERSION=$(yq eval '.version' Chart.yaml)

          echo "Git tag: ${GIT_TAG}"
          echo "Extracted tag version: ${TAG_VERSION}"
          echo "Chart.yaml version: ${CHART_VERSION}"

          if [ "${TAG_VERSION}" != "${CHART_VERSION}" ]; then
            echo "ERROR: Chart.yaml version (${CHART_VERSION}) does not match git tag version (${TAG_VERSION})"
            exit 1
          fi

          echo "Version verification passed: ${CHART_VERSION}"

      - name: Build Helm dependencies
        working-directory: ${{ steps.chart_path.outputs.path }}
        run: |
          set -euo pipefail
          helm dependency build

      - name: Package Helm chart
        working-directory: ${{ steps.chart_path.outputs.path }}
        run: |
          set -euo pipefail
          helm package .

      - name: Login to GitHub Container Registry
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Login to GitHub Container Registry for cosign
        if: inputs.enable_signing
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Push chart to GitHub OCI
        id: publish
        working-directory: ${{ steps.chart_path.outputs.path }}
        run: |
          set -euo pipefail
          CHART_NAME=$(yq eval '.name' Chart.yaml)
          CHART_VERSION=$(yq eval '.version' Chart.yaml)
          PACKAGE_FILE="${CHART_NAME}-${CHART_VERSION}.tgz"

          if [ ! -f "${PACKAGE_FILE}" ]; then
            echo "ERROR: Package file not found: ${PACKAGE_FILE}"
            exit 1
          fi

          OCI_REF="ghcr.io/${{ github.repository_owner }}/${CHART_NAME}:${CHART_VERSION}"
          push_log="$(mktemp)"
          echo "Pushing ${PACKAGE_FILE} to oci://ghcr.io/${{ github.repository_owner }}"
          helm push "${PACKAGE_FILE}" "oci://ghcr.io/${{ github.repository_owner }}" 2>&1 | tee "${push_log}"

          OCI_DIGEST="$(awk 'tolower($1) == "digest:" && $2 ~ /^sha256:/ {print $2; exit}' "${push_log}")"
          OCI_DIGEST_REF=""
          if [[ -n "${OCI_DIGEST}" ]]; then
            OCI_DIGEST_REF="ghcr.io/${{ github.repository_owner }}/${CHART_NAME}@${OCI_DIGEST}"
            echo "Captured OCI digest: ${OCI_DIGEST}"
          else
            echo "::warning::Helm push did not report a digest; signing will fall back to tag target."
          fi

          {
            echo "chart_name=${CHART_NAME}"
            echo "chart_version=${CHART_VERSION}"
            echo "oci_ref=${OCI_REF}"
            echo "oci_digest=${OCI_DIGEST}"
            echo "oci_digest_ref=${OCI_DIGEST_REF}"
          } >> "${GITHUB_OUTPUT}"

          echo "Successfully published: ${OCI_REF}"

      - name: Verify published OCI chart can be pulled
        working-directory: ${{ steps.chart_path.outputs.path }}
        run: |
          set -euo pipefail
          chart_name="${{ steps.publish.outputs.chart_name }}"
          chart_version="${{ steps.publish.outputs.chart_version }}"
          pull_dir="$(mktemp -d)"

          helm pull "oci://ghcr.io/${{ github.repository_owner }}/${chart_name}" \
            --version "${chart_version}" \
            --destination "${pull_dir}"

          package_file="${pull_dir}/${chart_name}-${chart_version}.tgz"
          if [[ ! -f "${package_file}" ]]; then
            echo "ERROR: Pulled chart package was not found: ${package_file}"
            exit 1
          fi

          helm show chart "${package_file}" >/dev/null
          echo "Successfully verified published chart: ${chart_name}:${chart_version}"

      - name: Sign OCI chart artifact (keyless)
        id: sign
        if: inputs.enable_signing
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          sign_target="${{ steps.publish.outputs.oci_digest_ref }}"
          if [[ -z "${sign_target}" ]]; then
            sign_target="${{ steps.publish.outputs.oci_ref }}"
            echo "::warning::Signing by tag because no OCI digest was captured from helm push."
          fi

          cosign sign --yes "${sign_target}"
          echo "sign_target=${sign_target}" >> "${GITHUB_OUTPUT}"

      - name: Attest OCI chart artifact (keyless)
        id: attest
        if: inputs.enable_signing
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          attest_target="${{ steps.publish.outputs.oci_digest_ref }}"
          if [[ -z "${attest_target}" ]]; then
            attest_target="${{ steps.publish.outputs.oci_ref }}"
            echo "::warning::Attesting by tag because no OCI digest was captured from helm push."
          fi

          BUILD_FINISHED_ON="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > provenance.json <<JSON
          {
            "builder": {
              "id": "https://github.com/orhayoun-eevee/build-workflow/.github/workflows/release-chart.yaml@${{ github.workflow_ref }}"
            },
            "buildType": "https://github.com/orhayoun-eevee/build-workflow/release-chart/v1",
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${{ github.repository }}.git",
                "digest": {
                  "sha1": "${{ github.sha }}"
                },
                "entryPoint": "${{ github.workflow_ref }}"
              }
            },
            "metadata": {
              "buildInvocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "buildFinishedOn": "${BUILD_FINISHED_ON}",
              "completeness": {
                "parameters": false,
                "environment": false,
                "materials": true
              },
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+https://github.com/${{ github.repository }}.git",
                "digest": {
                  "sha1": "${{ github.sha }}"
                }
              }
            ]
          }
          JSON

          cosign attest \
            --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${attest_target}"

          echo "attest_target=${attest_target}" >> "${GITHUB_OUTPUT}"

      - name: Summarize release
        run: |
          {
            echo "## Chart Release"
            echo ""
            echo "- Chart: \`${{ steps.publish.outputs.chart_name }}\`"
            echo "- Version: \`${{ steps.publish.outputs.chart_version }}\`"
            echo "- Tag: \`${{ steps.release_source.outputs.git_tag }}\`"
            echo "- Tag commit: \`${{ steps.release_source.outputs.tag_commit }}\`"
            echo "- Workflow SHA: \`${{ github.sha }}\`"
            echo "- OCI ref: \`${{ steps.publish.outputs.oci_ref }}\`"
            echo "- OCI digest: \`${{ steps.publish.outputs.oci_digest || 'not reported by helm push' }}\`"
            echo "- Signing enabled: \`${{ inputs.enable_signing }}\`"
            echo "- Signing target: \`${{ steps.sign.outputs.sign_target || 'not signed' }}\`"
            echo "- Attestation target: \`${{ steps.attest.outputs.attest_target || 'not attested' }}\`"
            echo "- Run: \`${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
