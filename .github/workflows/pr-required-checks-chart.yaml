name: PR Required Checks (Chart Repos)

on:
  workflow_call:
    inputs:
      chart_kind:
        description: 'Chart type: app or lib'
        required: true
        type: string
    secrets:
      gh_app_client_id:
        description: 'GitHub App client ID for minting installation token'
        required: true
      gh_app_private_key:
        description: 'GitHub App private key for minting installation token'
        required: true

permissions:
  contents: read

concurrency:
  group: required-checks-chart-${{ github.workflow }}-${{ github.ref }}-${{ github.repository }}
  cancel-in-progress: true

jobs:
  detect-changes:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      run_validate: ${{ steps.filter.outputs.run_validate }}
      run_renovate_validation: ${{ steps.filter.outputs.run_renovate_validation }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Mint app token for helper checkout
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.gh_app_client_id }}
          private-key: ${{ secrets.gh_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: build-workflow
          permission-contents: read

      - name: Checkout build-workflow helpers
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: orhayoun-eevee/build-workflow
          path: .build-workflow
          ref: v0.1.35
          token: ${{ steps.app-token.outputs.token }}

      - name: Detect changed paths
        id: filter
        shell: bash
        env:
          MODE: chart
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          CHART_KIND: ${{ inputs.chart_kind }}
        run: |
          set -euo pipefail
          ./.build-workflow/scripts/detect-required-checks.sh

  dependency-review:
    if: github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
    uses: orhayoun-eevee/build-workflow/.github/workflows/dependency-review.yaml@v0.1.35

  validate-app:
    if: inputs.chart_kind == 'app' && needs.detect-changes.outputs.run_validate == 'true'
    needs: detect-changes
    permissions:
      contents: read
      packages: read
    uses: orhayoun-eevee/build-workflow/.github/workflows/helm-validate.yaml@v0.1.35
    with:
      chart_path: .
      kubernetes_version: '1.30.0'
      scenarios_dir: tests/scenarios
      snapshots_dir: tests/snapshots
      run_syntax: true
      run_schema: true
      run_metadata: true
      run_tests: true
      run_policy: true
      target_branch: main
      run_version_check: true
    secrets:
      gh_app_client_id: ${{ secrets.gh_app_client_id }}
      gh_app_private_key: ${{ secrets.gh_app_private_key }}

  install-smoke-app:
    if: inputs.chart_kind == 'app' && needs.detect-changes.outputs.run_validate == 'true'
    needs:
      - detect-changes
      - validate-app
    permissions:
      contents: read
    uses: orhayoun-eevee/build-workflow/.github/workflows/helm-install-smoke.yaml@v0.1.35
    with:
      chart_path: .
      values_file: tests/scenarios/minimal.yaml
      kubernetes_version: '1.30.0'
      kind_node_image: 'kindest/node:v1.30.0@sha256:047357ac0cfea04663786a612ba1eaba9702bef25227a794b52890dd8bcd692e'
    secrets:
      gh_app_client_id: ${{ secrets.gh_app_client_id }}
      gh_app_private_key: ${{ secrets.gh_app_private_key }}

  validate-lib:
    if: inputs.chart_kind == 'lib' && needs.detect-changes.outputs.run_validate == 'true'
    needs: detect-changes
    permissions:
      contents: read
      packages: read
    uses: orhayoun-eevee/build-workflow/.github/workflows/helm-validate.yaml@v0.1.35
    with:
      chart_path: libChart
      kubernetes_version: '1.30.0'
      run_syntax: true
      run_schema: false
      run_metadata: true
      run_tests: false
      run_policy: false
      run_version_check: true
    secrets:
      gh_app_client_id: ${{ secrets.gh_app_client_id }}
      gh_app_private_key: ${{ secrets.gh_app_private_key }}

  validate-test:
    if: inputs.chart_kind == 'lib' && needs.detect-changes.outputs.run_validate == 'true'
    needs:
      - detect-changes
      - validate-lib
    permissions:
      contents: read
      packages: read
    uses: orhayoun-eevee/build-workflow/.github/workflows/helm-validate.yaml@v0.1.35
    with:
      chart_path: test-chart
      kubernetes_version: '1.30.0'
      scenarios_dir: tests/scenarios
      snapshots_dir: tests/snapshots
      run_syntax: true
      run_schema: true
      run_metadata: false
      run_tests: true
      run_policy: true
      target_branch: main
      run_version_check: false
    secrets:
      gh_app_client_id: ${{ secrets.gh_app_client_id }}
      gh_app_private_key: ${{ secrets.gh_app_private_key }}

  install-smoke-lib:
    if: inputs.chart_kind == 'lib' && needs.detect-changes.outputs.run_validate == 'true'
    needs:
      - detect-changes
      - validate-test
    permissions:
      contents: read
    uses: orhayoun-eevee/build-workflow/.github/workflows/helm-install-smoke.yaml@v0.1.35
    with:
      chart_path: test-chart
      values_file: tests/scenarios/minimal.yaml
      kubernetes_version: '1.30.0'
      kind_node_image: 'kindest/node:v1.30.0@sha256:047357ac0cfea04663786a612ba1eaba9702bef25227a794b52890dd8bcd692e'
    secrets:
      gh_app_client_id: ${{ secrets.gh_app_client_id }}
      gh_app_private_key: ${{ secrets.gh_app_private_key }}

  renovate-config-validation:
    needs: detect-changes
    if: needs.detect-changes.outputs.run_renovate_validation == 'true'
    permissions:
      contents: read
    uses: orhayoun-eevee/build-workflow/.github/workflows/renovate-config.yaml@v0.1.35

  ci-required:
    name: ci-required
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs:
      - detect-changes
      - dependency-review
      - validate-app
      - install-smoke-app
      - validate-lib
      - validate-test
      - install-smoke-lib
      - renovate-config-validation
    steps:
      - name: Validate required job results
        shell: bash
        run: |
          set -euo pipefail

          declare -A job_results=(
            ["detect-changes"]="${{ needs.detect-changes.result }}"
            ["dependency-review"]="${{ needs.dependency-review.result }}"
            ["validate-app"]="${{ needs.validate-app.result }}"
            ["install-smoke-app"]="${{ needs.install-smoke-app.result }}"
            ["validate-lib"]="${{ needs.validate-lib.result }}"
            ["validate-test"]="${{ needs.validate-test.result }}"
            ["install-smoke-lib"]="${{ needs.install-smoke-lib.result }}"
            ["renovate-config-validation"]="${{ needs.renovate-config-validation.result }}"
          )

          failed=0
          for job in "${!job_results[@]}"; do
            result="${job_results[$job]}"
            echo "${job}: ${result}"
            if [[ "${result}" == "failure" || "${result}" == "cancelled" ]]; then
              failed=1
            fi
          done

          if [[ "${failed}" -ne 0 ]]; then
            echo "One or more required PR checks failed."
            exit 1
          fi

          echo "All required PR checks passed."
