name: Build and Push Helm Validate Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/helm-validate

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: toolchain-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate release tag format
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF}" != refs/tags/* ]]; then
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              echo "ERROR: workflow_dispatch must target an existing tag ref. Got ${GITHUB_REF_TYPE}:${GITHUB_REF}"
            else
              echo "ERROR: Release workflow must run from a tag ref. Got ${GITHUB_REF_TYPE}:${GITHUB_REF}"
            fi
            exit 1
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              echo "ERROR: workflow_dispatch must target an existing semver tag ref (vMAJOR.MINOR.PATCH). Got: ${tag}"
            else
              echo "ERROR: Release tag must match vMAJOR.MINOR.PATCH. Got: ${tag}"
            fi
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
