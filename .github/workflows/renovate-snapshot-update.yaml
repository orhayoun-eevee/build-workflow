name: Renovate Snapshot Update

on:
  workflow_call:
    inputs:
      snapshots_dir:
        description: 'Path to snapshots directory in caller repo'
        required: false
        type: string
        default: 'tests/snapshots'
    secrets:
      gh_app_client_id:
        description: 'GitHub App client ID for minting installation token'
        required: true
      gh_app_private_key:
        description: 'GitHub App private key for minting installation token'
        required: true

permissions:
  contents: write
  packages: read

env:
  BUILD_WORKFLOW_REPOSITORY: orhayoun-eevee/build-workflow
  BUILD_WORKFLOW_REF: v0.1.34

concurrency:
  group: reusable-renovate-snapshot-update-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-snapshots:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'renovate/') && (github.actor == 'renovate[bot]' || github.actor == 'ghcr-automation[bot]') && (github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'app/renovate')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.gh_app_client_id }}
          private-key: ${{ secrets.gh_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.pull_request.head.repo.name }}
          permission-contents: write

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout build-workflow
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.BUILD_WORKFLOW_REPOSITORY }}
          path: .build-workflow
          ref: ${{ env.BUILD_WORKFLOW_REF }}
          persist-credentials: false

      - name: Build pinned validation image
        run: make docker-build BUILD_WORKFLOW=.build-workflow DOCKER_IMAGE=helm-validate:renovate

      - name: Regenerate render-only snapshots
        # This workflow refreshes render artifacts only. Install-time smoke
        # is enforced separately by the shared PR required-check gate.
        run: make snapshot-update BUILD_WORKFLOW=.build-workflow DOCKER_IMAGE=helm-validate:renovate

      - name: Commit and push updated snapshots
        id: write-back
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          BUILD_WORKFLOW_REF: ${{ env.BUILD_WORKFLOW_REF }}
          SNAPSHOTS_DIR: ${{ inputs.snapshots_dir }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          sanitize_push_stderr() {
            sed -E \
              -e 's#https://x-access-token:[^@]+@github\.com/#https://x-access-token:***@github.com/#g' \
              -e 's#x-access-token:[^@]+@#x-access-token:***@#g' \
              "$1"
          }

          write_multiline_output() {
            local name="$1"
            local file_path="$2"

            {
              echo "${name}<<EOF"
              cat "${file_path}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          }

          is_expected_workspace_path() {
            local path="$1"
            case "${path}" in
              .build-workflow|.build-workflow/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          current_ref="$(git rev-parse --abbrev-ref HEAD)"
          raw_git_status_file="$(mktemp)"
          git_status_file="$(mktemp)"
          snapshot_diff_stat_file="$(mktemp)"
          unexpected_paths_file="$(mktemp)"

          git status --short --untracked-files=all > "${raw_git_status_file}"
          : > "${git_status_file}"
          git diff --stat -- "${SNAPSHOTS_DIR}" > "${snapshot_diff_stat_file}" || true
          : > "${unexpected_paths_file}"

          snapshot_change_count=0
          while IFS= read -r line; do
            [[ -z "${line}" ]] && continue

            path="${line:3}"
            if is_expected_workspace_path "${path}"; then
              continue
            fi

            printf '%s\n' "${line}" >> "${git_status_file}"
            case "${path}" in
              "${SNAPSHOTS_DIR}"|"${SNAPSHOTS_DIR}/"*)
                snapshot_change_count=$((snapshot_change_count + 1))
                ;;
              *)
                printf '%s\n' "${path}" >> "${unexpected_paths_file}"
                ;;
            esac
          done < "${raw_git_status_file}"

          {
            echo "current_ref=${current_ref}"
            echo "target_ref=${PR_HEAD_REF}"
            echo "build_workflow_ref=${BUILD_WORKFLOW_REF}"
            echo "snapshot_change_count=${snapshot_change_count}"
            echo "pushed_sha="
          } >> "${GITHUB_OUTPUT}"

          if [[ -s "${unexpected_paths_file}" ]]; then
            echo "result=unexpected-diff" >> "${GITHUB_OUTPUT}"
            write_multiline_output "git_status" "${git_status_file}"
            write_multiline_output "unexpected_paths" "${unexpected_paths_file}"
            write_multiline_output "snapshot_diff_stat" "${snapshot_diff_stat_file}"

            echo "Unexpected non-snapshot changes detected after snapshot refresh:"
            echo "Git status:"
            cat "${git_status_file}"
            cat "${unexpected_paths_file}"
            echo "Snapshot diff scope (${SNAPSHOTS_DIR}):"
            cat "${snapshot_diff_stat_file}"
            exit 1
          fi

          if (( snapshot_change_count == 0 )); then
            echo "result=no-op" >> "${GITHUB_OUTPUT}"
            echo "No snapshot changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${SNAPSHOTS_DIR}"
          git commit -m "test(snapshot): refresh snapshots for renovate update"

          push_stderr_file="$(mktemp)"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if ! git push origin "HEAD:${PR_HEAD_REF}" 2>"${push_stderr_file}"; then
            sanitized_push_stderr_file="$(mktemp)"
            sanitize_push_stderr "${push_stderr_file}" > "${sanitized_push_stderr_file}"

            echo "result=push-failed" >> "${GITHUB_OUTPUT}"
            write_multiline_output "git_status" "${git_status_file}"
            write_multiline_output "snapshot_diff_stat" "${snapshot_diff_stat_file}"
            write_multiline_output "push_stderr" "${sanitized_push_stderr_file}"

            echo "Push failed for target ref: ${PR_HEAD_REF}"
            echo "Current ref: ${current_ref}"
            echo "Git status:"
            cat "${git_status_file}"
            echo "Snapshot diff scope (${SNAPSHOTS_DIR}):"
            cat "${snapshot_diff_stat_file}"
            echo "Sanitized push stderr:"
            cat "${sanitized_push_stderr_file}"
            exit 1
          fi

          pushed_sha="$(git rev-parse HEAD)"
          {
            echo "result=changed"
            echo "pushed_sha=${pushed_sha}"
          } >> "${GITHUB_OUTPUT}"
          write_multiline_output "snapshot_diff_stat" "${snapshot_diff_stat_file}"

      - name: Summarize snapshot write-back
        if: always()
        env:
          BUILD_WORKFLOW_REF_SUMMARY: ${{ env.BUILD_WORKFLOW_REF }}
          CURRENT_REF: ${{ steps.write-back.outputs.current_ref }}
          GIT_STATUS: ${{ steps.write-back.outputs.git_status }}
          PR_HEAD_REF_SUMMARY: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER_SUMMARY: ${{ github.event.pull_request.number }}
          PRE_WRITE_SHA_SUMMARY: ${{ github.event.pull_request.head.sha }}
          PUSHED_SHA: ${{ steps.write-back.outputs.pushed_sha }}
          PUSH_STDERR: ${{ steps.write-back.outputs.push_stderr }}
          REPOSITORY_NAME: ${{ github.repository }}
          RESULT: ${{ steps.write-back.outputs.result }}
          SNAPSHOT_CHANGE_COUNT: ${{ steps.write-back.outputs.snapshot_change_count }}
          SNAPSHOT_DIFF_STAT: ${{ steps.write-back.outputs.snapshot_diff_stat }}
          TARGET_REF: ${{ steps.write-back.outputs.target_ref }}
          UNEXPECTED_PATHS: ${{ steps.write-back.outputs.unexpected_paths }}
        run: |
          {
            echo "## Renovate Snapshot Update"
            echo ""
            echo "- Repository: \`${REPOSITORY_NAME}\`"
            echo "- PR number: \`${PR_NUMBER_SUMMARY}\`"
            echo "- PR head ref: \`${PR_HEAD_REF_SUMMARY}\`"
            echo "- Pre-write PR head SHA: \`${PRE_WRITE_SHA_SUMMARY}\`"
            echo "- build-workflow ref: \`${BUILD_WORKFLOW_REF_SUMMARY}\`"
            echo "- Result: \`${RESULT:-unknown}\`"
            echo "- Changed snapshot file count: \`${SNAPSHOT_CHANGE_COUNT:-0}\`"
            echo "- Pushed commit SHA: \`${PUSHED_SHA:-n/a}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ -n "${UNEXPECTED_PATHS:-}" ]]; then
            {
              echo ""
              echo "### Unexpected Non-Snapshot Changes"
              echo '```text'
              printf '%s\n' "${UNEXPECTED_PATHS}"
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

          if [[ "${RESULT:-}" == "push-failed" ]]; then
            {
              echo ""
              echo "- Current ref: \`${CURRENT_REF:-unknown}\`"
              echo "- Target ref: \`${TARGET_REF:-unknown}\`"
              echo ""
              echo "### Git Status"
              echo '```text'
              printf '%s\n' "${GIT_STATUS:-}"
              echo '```'
              echo ""
              echo "### Snapshot Diff Scope"
              echo '```text'
              printf '%s\n' "${SNAPSHOT_DIFF_STAT:-}"
              echo '```'
              echo ""
              echo "### Sanitized Push Stderr"
              echo '```text'
              printf '%s\n' "${PUSH_STDERR:-}"
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
